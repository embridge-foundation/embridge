name: Reference Parser

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Test reference parser package
        working-directory: tools/reference-parser
        run: npm test

      - name: Check conformance fixtures
        working-directory: tools/reference-parser
        run: npm run check

      - name: Dry-run package tarball
        working-directory: tools/reference-parser
        run: npm pack --dry-run
